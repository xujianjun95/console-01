<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  /* ── 默认：博朗 拟物 · 奶白塑料 ── */
  :root, :root[data-theme="light"] {
    --bg1:#DAD8D1; --bg2:#C9C7BF;
    --card-top:#F2F0EA; --card-bot:#E2E0D8;
    --text:#33322D; --dim:#8E8C82;
    --line:rgba(0,0,0,.07);
    --accent:#EC5E2A; --accent-top:#F7824F; --accent-bot:#D84C19;
    --groove:#C5C3BA; --groove-sh:rgba(0,0,0,.22);
    --btn-top:#F3F1EB; --btn-bot:#E0DED6;
    --thumb-top:#FBFAF7; --thumb-bot:#D7D5CD;
    --hi:rgba(255,255,255,.8);
    --drop:rgba(45,42,35,.20);
    --lcd-bg1:#C4C9BD; --lcd-bg2:#B2B7AA;
    --lcd-on:#2C302A; --lcd-off:rgba(44,48,42,.10);
    --lcd-cal:rgba(44,48,42,.55);
    --scan:rgba(0,0,0,.05);
    --time-glow:none;
    --dot:rgba(0,0,0,.28);
    --tick:#BDBDBD; --tick-major:#6A6A6A;
    --mon-track:rgba(0,0,0,.07); --mon-cpu:#7CB342; --mon-mem:#EC5E2A; --mon-net:#9A988F;
    --btn-press-text:#fff;
  }

  /* ── 暗色：石墨塑料变体 ── */
  :root[data-theme="dark"] {
    --bg1:#1c1c1e; --bg2:#121214;
    --card-top:#2c2c2e; --card-bot:#232325;
    --text:#F2F1ED; --dim:#8E8C86;
    --line:rgba(255,255,255,.06);
    --accent:#EC6A2C; --accent-top:#F7884C; --accent-bot:#DC551A;
    --groove:#111113; --groove-sh:rgba(0,0,0,.6);
    --btn-top:#343436; --btn-bot:#28282a;
    --thumb-top:#C8C8C8; --thumb-bot:#A4A4A4;
    --hi:rgba(255,255,255,.08);
    --drop:rgba(0,0,0,.5);
    --lcd-bg1:#15130f; --lcd-bg2:#100e0b;
    --lcd-on:var(--accent); --lcd-off:rgba(236,106,44,.12);
    --lcd-cal:rgba(255,255,255,.55);
    --scan:rgba(0,0,0,.2);
    --time-glow:0 0 9px rgba(236,106,44,.55), 0 0 26px rgba(236,106,44,.3);
    --dot:rgba(255,255,255,.18);
    --tick:#505050; --tick-major:#909090;
    --mon-track:rgba(255,255,255,.07); --mon-cpu:#8BC34A; --mon-mem:#EC6A2C; --mon-net:#CFCFCF;
    --btn-press-text:#fff;
  }

  html, body {
    width: 100%; height: 100%; overflow: hidden;
    color: var(--text);
    background: linear-gradient(165deg, var(--bg1), var(--bg2));
    font-family: -apple-system, "SF Pro Display", "Helvetica Neue", "PingFang SC", sans-serif;
    -webkit-user-select: none; user-select: none;
    transition: background .35s ease, color .35s ease;
  }
  svg { display: block; }

  .rotate-tip {
    display: none; position: fixed; inset: 0; z-index: 99;
    flex-direction: column; align-items: center; justify-content: center; gap: 18px; color: var(--dim);
    background: linear-gradient(165deg, var(--bg1), var(--bg2));
  }
  .rotate-tip .ph { width: 80px; height: 46px; border: 3px solid var(--dim); border-radius: 9px; animation: tilt 2.2s ease-in-out infinite; }
  .rotate-tip p { font-size: 14px; letter-spacing: 2px; }
  @keyframes tilt { 0%,40%{transform:rotate(0)} 70%,100%{transform:rotate(-90deg)} }

  .wrap {
    position: fixed; inset: 0;
    display: flex; flex-direction: row;
    padding:
      max(env(safe-area-inset-top),    9px)
      max(env(safe-area-inset-right), 11px)
      max(env(safe-area-inset-bottom), 9px)
      max(env(safe-area-inset-left),  11px);
    gap: 9px;
  }
  @media (orientation: portrait) { .rotate-tip{display:flex} .wrap{display:none} }

  /* ── 奶白塑料面板 ── */
  .module {
    border-radius: 7px; border: 1px solid var(--line);
    background: linear-gradient(180deg, var(--card-top), var(--card-bot));
    box-shadow:
      inset 0 1px 0 var(--hi),
      inset 0 -1px 2px rgba(0,0,0,.05),
      0 1px 1px rgba(0,0,0,.05),
      0 10px 22px var(--drop);
    padding: 11px 12px; display: flex; flex-direction: column; flex-shrink: 0;
    transition: background .35s ease, border-color .35s ease;
  }
  .mod-title {
    position: relative; width: 100%; text-align: center;
    font-size: 10px; color: var(--dim); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 6px;
  }
  .mod-title::before { display: none; }

  /* ── ET66 计算器风格推子 ── */
  .fader-mod { width: 96px; flex-direction: row; gap: 8px; }
  .fader-col {
    flex: 1; min-width: 0; display: flex; flex-direction: column; align-items: center;
  }
  .readout {
    font-size: 13px; font-weight: 700; color: var(--accent);
    font-variant-numeric: tabular-nums; height: 17px; margin-top: 4px;
  }
  .et66-track {
    flex: 1; position: relative; width: 100%; min-height: 0;
    touch-action: none; cursor: pointer;
  }
  .et66-ticks {
    position: absolute; top: 6px; bottom: 6px; left: 50%; transform: translateX(-50%);
    display: flex; flex-direction: column; justify-content: space-between;
    align-items: center; pointer-events: none;
  }
  .et66-tick {
    display: block; width: 16px; height: 1.5px;
    background: var(--tick); border-radius: 1px; flex-shrink: 0;
  }
  .et66-tick.major { width: 26px; height: 2px; background: var(--tick-major); }
  .et66-dot {
    position: absolute; left: 50%;
    width: 10px; height: 10px; border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 1px 4px rgba(0,0,0,.28);
    pointer-events: none;
    transform: translate(-50%, -50%);
    z-index: 1;
  }

  /* ── 中间：时钟 + 快捷 ── */
  .center-mod { flex: 1.95; min-width: 0; padding-top: 11px; padding-bottom: 11px; justify-content: flex-start; gap: 11px; }
  .clock-area { flex: 0 0 auto; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }

  /* 显示屏：LCD 液晶（淡青灰底 + 段码） */
  .clock-screen {
    position: relative; overflow: hidden; flex: 0 0 auto;
    width: 100%; height: 122px; padding: 0 26px; border-radius: 7px;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    background: linear-gradient(160deg, var(--lcd-bg1), var(--lcd-bg2));
    box-shadow: inset 0 2px 6px rgba(0,0,0,.32), inset 0 0 0 2px rgba(0,0,0,.06), 0 1px 0 var(--hi);
  }
  .clock-screen::before {   /* 顶部反光弧 */
    content: ''; position: absolute; inset: 0; border-radius: 14px; pointer-events: none; z-index: 2;
    background: radial-gradient(135% 90% at 50% -12%, rgba(255,255,255,.18), transparent 55%);
  }
  .clock-screen::after {    /* 细密扫描线 */
    content: ''; position: absolute; inset: 0; border-radius: 14px; pointer-events: none; z-index: 2;
    background: repeating-linear-gradient(0deg, var(--scan) 0 1px, transparent 1px 3px);
  }
  .brand-row {   /* 外壳顶部：BRAUN logo + 型号，一行 ── */
    flex: 0 0 auto; display: flex; align-items: center; justify-content: space-between;
    width: 100%; padding: 0 2px;
  }

<body>

<script>
const $ = id => document.getElementById(id);
let dragging = false, briCli = false, lastPlaying = null, lastTrack = null;

const ICON_PLAY  = '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M7 5.5v13a1 1 0 0 0 1.5.9l11-6.5a1 1 0 0 0 0-1.8l-11-6.5A1 1 0 0 0 7 5.5z"/></svg>';
const ICON_PAUSE = '<svg viewBox="0 0 24 24" fill="currentColor"><rect x="6.5" y="5" width="4" height="14" rx="1.2"/><rect x="13.5" y="5" width="4" height="14" rx="1.2"/></svg>';
$('playBtn').innerHTML = ICON_PLAY;

// 主题切换
const root = document.documentElement;
function setTheme(t) {
  root.dataset.theme = t;
  localStorage.setItem('theme', t);
  const tg = $('themeToggle'); if (tg) tg.textContent = t === 'dark' ? '☀️' : '🌙';
  const tl = $('themeLight'), td = $('themeDark');
  if (tl && td) {
    tl.classList.toggle('running', t === 'light');
    td.classList.toggle('running', t === 'dark');
  }
}
setTheme(localStorage.getItem('theme') || 'light');

// ── ET66 纵向刻度推子 ──
function buildTicks(el) {
  for (let i = 0; i <= 20; i++) {
    const t = document.createElement('div');
    t.className = 'et66-tick' + (i % 5 === 0 ? ' major' : '');
    el.appendChild(t);
  }
}
buildTicks($('volTicks'));
buildTicks($('briTicks'));

function syncET66(trackEl, dotEl, pct) {
  pct = Math.max(0, Math.min(100, pct));
  const pad = 6, h = Math.max(0, trackEl.clientHeight - pad * 2);
  dotEl.style.top = (pad + (1 - pct / 100) * h) + 'px';
}
function setupET66(trackEl, dotEl, readoutEl, initVal, onCommit) {
  let val = initVal;
  function getVal(clientY) {
    const rect = trackEl.getBoundingClientRect(), pad = 6, h = rect.height - pad * 2;
    return Math.max(0, Math.min(100, Math.round((rect.bottom - clientY - pad) / h * 100)));
  }
  function update(v) { val = v; syncET66(trackEl, dotEl, v); readoutEl.textContent = v; }
  trackEl.addEventListener('pointerdown', e => { e.preventDefault(); trackEl.setPointerCapture(e.pointerId); dragging = true; update(getVal(e.clientY)); });
  trackEl.addEventListener('pointermove', e => { if (!trackEl.hasPointerCapture(e.pointerId)) return; update(getVal(e.clientY)); });
  ['pointerup','pointercancel'].forEach(ev => trackEl.addEventListener(ev, e => {
    if (!trackEl.hasPointerCapture(e.pointerId)) return;
    trackEl.releasePointerCapture(e.pointerId); onCommit(val); setTimeout(() => dragging = false, 400);
  }));
  update(initVal);
  return { get: () => val, set: v => update(v) };
}

const volFader = setupET66($('volTrack'), $('volDot'), $('volVal'), 50, v => api('/api/volume', {value: v}));
const briFader = setupET66($('briTrack'), $('briDot'), $('briVal'),
  parseInt(localStorage.getItem('briLocal') || '50', 10), v => {
    if (briCli) { api('/api/brightness', {value: v}); }
    else {
      const prev = parseInt(localStorage.getItem('briLocal') || '50', 10);
      let delta = v - prev;
      if (v === 0) delta = -100; else if (v === 100) delta = 100;
      if (delta) api('/api/brightness', {delta});
      localStorage.setItem('briLocal', v);
    }
  });
function recalcFaders() {
  syncET66($('volTrack'), $('volDot'), volFader.get());
  syncET66($('briTrack'), $('briDot'), briFader.get());
}
function recalcSoon() { [0,100,350,700].forEach(t => setTimeout(recalcFaders, t)); }
window.addEventListener('resize', recalcSoon);
window.addEventListener('orientationchange', recalcSoon);
window.addEventListener('load', recalcSoon);
requestAnimationFrame(recalcFaders);

function tick() {
  const d = new Date();
  $('hh').textContent = String(d.getHours()).padStart(2,'0');
  $('mm').textContent = String(d.getMinutes()).padStart(2,'0');
  $('cal').textContent = `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日 星期${'日一二三四五六'[d.getDay()]}`;
}
tick(); setInterval(tick, 1000);

async function api(path, body) {
  try { return await (await fetch(path, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(body||{}) })).json(); }
  catch(e) { return null; }
}

function music(action) {
  if (action === 'playpause') { lastPlaying = !lastPlaying; $('playBtn').innerHTML = lastPlaying ? ICON_PAUSE : ICON_PLAY; }
  api('/api/music', {action});
  if (action === 'prev' || action === 'next') { setTimeout(refreshStatus, 300); setTimeout(refreshStatus, 900); }
}
function sys(action) {
  if (action === 'sleep' && !confirm('确定让 Mac 睡眠？')) return;
  api('/api/system', {action});
}

async function refreshStatus() {
  try {
    const s = await (await fetch('/api/status')).json();
    briCli = !!s.brightnessCli;
    if (!dragging) {
      if (s.volume != null) volFader.set(s.volume);
      if (briCli && s.brightness != null) briFader.set(s.brightness);
    }
    if (s.playing !== lastPlaying) { lastPlaying = s.playing; $('playBtn').innerHTML = s.playing ? ICON_PAUSE : ICON_PLAY; }
    const raw = s.track || '—';
    const sep = raw.indexOf(' — ');
    $('track').textContent  = sep > -1 ? raw.slice(0, sep)  : raw;
    $('artist').textContent = sep > -1 ? raw.slice(sep + 3) : '';
    if (s.apps) {
      document.querySelectorAll('.pkey[data-app]').forEach(btn => {
        btn.classList.toggle('running', !!s.apps[btn.dataset.app]);
      });
    }
    if (s.track !== lastTrack) {
      lastTrack = s.track;
      const img = $('cover');
      if (s.cover) {
        const url = s.cover === '/api/cover' ? '/api/cover?t=' + encodeURIComponent(s.track) : s.cover;
        img.style.opacity = 0;
        const pre = new Image();
        pre.onload = () => { img.src = url; requestAnimationFrame(() => img.style.opacity = 1); };
        pre.onerror = () => { img.removeAttribute('src'); img.style.opacity = 0; };
        pre.src = url;
      } else { img.style.opacity = 0; setTimeout(() => img.removeAttribute('src'), 450); }
    }
  } catch(e) {}
}

// ── 同心环点阵碟 ──
function buildDisc(el) {
  const cx = 50, cy = 50, rings = 9, rIn = 15, rOut = 48, HI = 130; // 顶部高亮弧约 130°
  for (let i = 0; i < rings; i++) {
    const rad = rIn + (rOut - rIn) * i / (rings - 1);
    const count = Math.max(8, Math.round(2 * Math.PI * rad / 4.2));
    for (let k = 0; k < count; k++) {
      const a = k / count * 360;            // 0 在顶部，顺时针
      const ang = (a - 90) * Math.PI / 180;
      const dot = document.createElement('span');
      dot.className = 'disc-dot' + (a <= HI ? ' on' : '');
      dot.style.left = (cx + rad * Math.cos(ang)) + '%';
      dot.style.top  = (cy + rad * Math.sin(ang)) + '%';
      el.appendChild(dot);
    }
  }
}
buildDisc($('disc'));

// ── 系统监控柱状图 ──
const MON_COLS = 40;
function buildGraph(el) {
  const cols = [];
  for (let i = 0; i < MON_COLS; i++) {
    const col = document.createElement('div'); col.className = 'mon-col';
    const fill = document.createElement('div'); fill.className = 'mon-fill';
    col.appendChild(fill); el.appendChild(col); cols.push(fill);
  }
  return cols;
}
const cpuCols = buildGraph($('cpuGraph'));
const memCols = buildGraph($('memGraph'));
const netCols = buildGraph($('netGraph'));
const cpuHist = new Array(MON_COLS).fill(0);
const memHist = new Array(MON_COLS).fill(0);
const netHist = new Array(MON_COLS).fill(0);  // 原始 bps，绘制时按动态峰值归一
let netPeak = 1;

function pushHist(hist, cols, v, scale) {
  hist.push(v); hist.shift();
  for (let i = 0; i < MON_COLS; i++) {
    cols[i].style.height = Math.max(0, Math.min(100, hist[i] * scale)) + '%';
  }
}

async function refreshStats() {
  try {
    const s = await (await fetch('/api/stats')).json();
    const cpu = s.cpu ?? 0, mem = s.mem ?? 0;
    $('sCpu').textContent = s.cpu != null ? cpu + '%' : '--';
    $('sMem').textContent = s.mem != null ? mem + '%' : '--';
    $('sRx').textContent = '↓ ' + (s.net_rx || '0B') + '/s';
    $('sTx').textContent = '↑ ' + (s.net_tx || '0B') + '/s';
    pushHist(cpuHist, cpuCols, cpu, 1);
    pushHist(memHist, memCols, mem, 1);
    const net = (s.net_rx_bps || 0) + (s.net_tx_bps || 0);
    netPeak = Math.max(net, Math.max(...netHist), 1024) * 0.96;  // 缓慢回落的峰值基准
    pushHist(netHist, netCols, net, 100 / netPeak);
  } catch(e) {}
}

// 按钮按下脉冲
document.querySelectorAll('.key, .gkey').forEach(btn => {
  btn.addEventListener('pointerdown', () => {
    btn.classList.add('pressed');
    setTimeout(() => btn.classList.remove('pressed'), 220);
  });
});

refreshStatus(); setInterval(refreshStatus, 3000);
refreshStats();  setInterval(refreshStats, 2000);
</script>
</body>
</html>
