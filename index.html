<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  /* ── 默认：博朗 拟物 · 奶白塑料 ── */
  :root, :root[data-theme="light"] {
    --theme-dur:780ms; --theme-ease:cubic-bezier(.35,0,.2,1);
    --bg1:#DAD8D1; --bg2:#C9C7BF;
    --card-top:#F2F0EA; --card-bot:#E2E0D8;
    --text:#33322D; --dim:#8E8C82;
    --line:rgba(0,0,0,.07);
    --accent:#EC5E2A; --accent-top:#F7824F; --accent-bot:#D84C19;
    --groove:#C5C3BA; --groove-sh:rgba(0,0,0,.22);
    --btn-top:#F3F1EB; --btn-bot:#E0DED6;
    --thumb-top:#FBFAF7; --thumb-bot:#D7D5CD;
    --hi:rgba(255,255,255,.8);
    --drop:rgba(45,42,35,.20);
    --lcd-bg1:#C4C9BD; --lcd-bg2:#B2B7AA;
    --lcd-on:#2C302A; --lcd-off:rgba(44,48,42,.10);
    --lcd-cal:rgba(44,48,42,.55);
    --scan:rgba(0,0,0,.05);
    --time-glow:none;
    --dot:rgba(0,0,0,.28);
    --tick:#BDBDBD; --tick-major:#6A6A6A;
    --mon-track:rgba(0,0,0,.07); --mon-cpu:#7CB342; --mon-mem:#EC5E2A; --mon-net:#9A988F;
    --btn-press-text:#fff;
  }

  :root[data-theme="night"] {
    --theme-dur:900ms; --theme-ease:cubic-bezier(.35,0,.2,1);
    --bg1:#4D4A43; --bg2:#34322E;
    --card-top:#76736A; --card-bot:#5F5C54;
    --text:#1F1E1A; --dim:#37352F;
    --line:rgba(0,0,0,.16);
    --accent:#873519; --accent-top:#9D4826; --accent-bot:#662611;
    --groove:#4A4740; --groove-sh:rgba(0,0,0,.42);
    --btn-top:#747168; --btn-bot:#56534C;
    --thumb-top:#89867C; --thumb-bot:#55524B;
    --hi:rgba(255,255,255,.16);
    --drop:rgba(10,9,7,.42);
    --lcd-bg1:#424838; --lcd-bg2:#303529;
    --lcd-on:#171B15; --lcd-off:rgba(23,27,21,.10);
    --lcd-cal:rgba(23,27,21,.40);
    --scan:rgba(0,0,0,.03);
    --time-glow:none;
    --dot:rgba(0,0,0,.38);
    --tick:#56544E; --tick-major:#30302C;
    --mon-track:rgba(0,0,0,.16); --mon-cpu:#40552A; --mon-mem:#873519; --mon-net:#403E38;
    --btn-press-text:#E4DDD4;
  }

  html {
    background-color: var(--bg2);
  }
  html, body {
    width: 100%; height: 100%; overflow: hidden;
    color: var(--text);
    background: linear-gradient(165deg, var(--bg1), var(--bg2));
    font-family: -apple-system, "SF Pro Display", "Helvetica Neue", "PingFang SC", sans-serif;
    -webkit-user-select: none; user-select: none;
    transition: background var(--theme-dur) var(--theme-ease), color var(--theme-dur) var(--theme-ease);
  }
  svg { display: block; }

  .rotate-tip {
    display: flex; position: fixed; inset: 0; z-index: 99;
    flex-direction: column; align-items: center; justify-content: center; gap: 18px; color: var(--dim);
    min-height: 100dvh;
    background-color: var(--bg2);
    background: linear-gradient(165deg, var(--bg1), var(--bg2));
    opacity: 0; visibility: hidden; pointer-events: none;
    transform: scale(1.015);
    transition: opacity .32s ease, visibility .32s ease, transform .32s cubic-bezier(.35,0,.2,1);
  }
  .rotate-tip .ph { width: 80px; height: 46px; border: 3px solid var(--dim); border-radius: 9px; animation: tilt 2.2s ease-in-out infinite; }
  .rotate-tip p { font-size: 14px; letter-spacing: 2px; }
  @keyframes tilt { 0%,40%{transform:rotate(0)} 70%,100%{transform:rotate(-90deg)} }

  .wrap {
    position: fixed; inset: 0;
    display: flex; flex-direction: row;
    padding:
      max(env(safe-area-inset-top),    9px)
      max(env(safe-area-inset-right), 11px)
      max(env(safe-area-inset-bottom), 9px)
      max(env(safe-area-inset-left),  11px);
    gap: 9px;
    opacity: 1; visibility: visible; pointer-events: auto;
    transform: scale(1);
    transition: opacity .34s ease, visibility .34s ease, transform .34s cubic-bezier(.35,0,.2,1);
  }
  @media (orientation: portrait) {
    .rotate-tip {
      opacity: 1; visibility: visible; pointer-events: auto;
      transform: scale(1);
    }
    .wrap {
      opacity: 0; visibility: hidden; pointer-events: none;
      transform: scale(.975);
    }
  }

  /* ── 奶白塑料面板 ── */
  .module {
    border-radius: 7px; border: 1px solid var(--line);
    background: linear-gradient(180deg, var(--card-top), var(--card-bot));
    box-shadow:
      inset 0 1px 0 var(--hi),
      inset 0 -1px 2px rgba(0,0,0,.05),
      0 1px 1px rgba(0,0,0,.05),
      0 10px 22px var(--drop);
    padding: 11px 12px; display: flex; flex-direction: column; flex-shrink: 0;
    transition:
      background var(--theme-dur) var(--theme-ease),
      border-color var(--theme-dur) var(--theme-ease),
      box-shadow var(--theme-dur) var(--theme-ease);
  }
  .mod-title {
    position: relative; width: 100%; text-align: center;
    font-size: 10px; color: var(--dim); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 6px;
    transition: color var(--theme-dur) var(--theme-ease);
  }
  .mod-title::before { display: none; }

  /* ── ET66 计算器风格推子 ── */
  .fader-mod { width: 96px; flex-direction: row; gap: 8px; }
  .fader-col {
    flex: 1; min-width: 0; display: flex; flex-direction: column; align-items: center;
  }
  .readout {
    font-size: 13px; font-weight: 700; color: var(--accent);
    font-variant-numeric: tabular-nums; height: 17px; margin-top: 4px;
    transition: color var(--theme-dur) var(--theme-ease);
  }
  .et66-track {
    flex: 1; position: relative; width: 100%; min-height: 0;
    touch-action: none; cursor: pointer;
  }
  .et66-ticks {
    position: absolute; top: 6px; bottom: 6px; left: 50%; transform: translateX(-50%);
    display: flex; flex-direction: column; justify-content: space-between;
    align-items: center; pointer-events: none;
  }
  .et66-tick {
    display: block; width: 16px; height: 1.5px;
    background: var(--tick); border-radius: 1px; flex-shrink: 0;
    transition: background var(--theme-dur) var(--theme-ease);
  }
  .et66-tick.major { width: 26px; height: 2px; background: var(--tick-major); }
  .et66-dot {
    position: absolute; left: 50%;
    width: 10px; height: 10px; border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 1px 4px rgba(0,0,0,.28);
    pointer-events: none;
    transform: translate(-50%, -50%);
    z-index: 1;

  /* ── 中间：时钟 + 快捷 ── */

  }

<body>
  <div class="rotate-tip"><div class="ph"></div><p>请 横 屏 使 用</p></div>

<script>
const $ = id => document.getElementById(id);
let dragging = false, briCli = false, lastPlaying = null, lastTrack = null, lastMuted = null, powered = true, muteBusy = false;
let nightMode = document.documentElement.dataset.theme === 'night';
let pendingVolume = null, pendingBrightness = null, lastSystemVolume = null, preMuteVolume = null;
let playbackPending = null;
let dischargeTids = [];
function clearDischarge() { dischargeTids.forEach(clearTimeout); dischargeTids = []; }

const ICON_PLAY  = '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M7 5.5v13a1 1 0 0 0 1.5.9l11-6.5a1 1 0 0 0 0-1.8l-11-6.5A1 1 0 0 0 7 5.5z"/></svg>';
const ICON_PAUSE = '<svg viewBox="0 0 24 24" fill="currentColor"><rect x="6.5" y="5" width="4" height="14" rx="1.2"/><rect x="13.5" y="5" width="4" height="14" rx="1.2"/></svg>';
$('playBtn').innerHTML = ICON_PLAY;

function applyTheme() {
  document.documentElement.dataset.theme = nightMode ? 'night' : 'light';
  $('nightBtn')?.classList.toggle('active', nightMode);
  $('themeColor')?.setAttribute('content', nightMode ? '#4E4B45' : '#D8D5CC');
  try { localStorage.setItem('consoleTheme', nightMode ? 'night' : 'light'); } catch(e) {}
}
function toggleNight() {
  nightMode = !nightMode;
  document.documentElement.classList.remove('theme-changing');
  void document.documentElement.offsetWidth;
  document.documentElement.classList.add('theme-changing');
  applyTheme();
  setTimeout(() => document.documentElement.classList.remove('theme-changing'), 950);
}
applyTheme();

// 电源开关
function togglePower() {
  powered = !powered;
  $('swTrack').classList.toggle('off', !powered);
  document.querySelector('.fader-mod').classList.toggle('fader-off', !powered);
  if (!powered) {
    if (lastPlaying) api('/api/music', {action: 'playpause'});
    powerOffAnimation();
    renderBluetooth([]);
    $('track').textContent = '—'; $('artist').textContent = '—';
    $('disc').classList.remove('playing'); $('disc').classList.add('standby');
    playbackPending = null;
    $('playBtn').innerHTML = ICON_PLAY; lastPlaying = false;
  } else {
    $('disc').classList.remove('standby');
    powerOnAnimation();
    if (pendingVolume != null) {
      api('/api/volume', {value: pendingVolume});
      pendingVolume = null;
    }
    if (pendingBrightness != null) {
      commitBrightness(pendingBrightness);
      pendingBrightness = null;
    }
    refreshStatus(); refreshBluetooth();
  }
}

function powerOffAnimation() {
  clearDischarge();
  const real = document.querySelector('.time .real');
  const cal  = $('cal');
  // 阶段1：供电不足
  Object.assign(real.style, { transition: 'filter 150ms, opacity 150ms', filter: 'brightness(0.75)', opacity: '0.75' });
  Object.assign(cal.style,  { transition: 'filter 150ms, opacity 150ms', filter: 'brightness(0.75)', opacity: '0.75' });
  // 阶段2：全段码残影
  dischargeTids.push(setTimeout(() => {
    $('hh').textContent = '88'; $('mm').textContent = '88';
    $('calDate').textContent = '8888年88月88日';
    $('weekText').textContent = '日';
    $('weekGhost').textContent = '日';
    Object.assign(real.style, { transition: 'opacity 80ms', filter: '', opacity: '0.3' });
    Object.assign(cal.style,  { transition: 'opacity 80ms', filter: '', opacity: '0.3' });
  }, 150));
  // 阶段3：垂直塌缩
  dischargeTids.push(setTimeout(() => {
    Object.assign(real.style, { transition: 'filter 150ms, transform 150ms', filter: 'blur(1.5px)', transform: 'scaleY(0.96)' });
    Object.assign(cal.style,  { transition: 'filter 150ms, transform 150ms', filter: 'blur(1px)',   transform: 'scaleY(0.96)' });
  }, 330));
  // 阶段4：完全消失
  dischargeTids.push(setTimeout(() => {
    Object.assign(real.style, { transition: 'opacity 220ms', opacity: '0' });
    Object.assign(cal.style,  { transition: 'opacity 220ms', opacity: '0' });
  }, 480));
}

function powerOnAnimation() {
  clearDischarge();
  dischargeTids.push(setTimeout(() => {
    document.querySelector('.time .real').removeAttribute('style');
    $('cal').removeAttribute('style');
  }, 650));
}

// ── ET66 纵向刻度推子 ──
function buildTicks(el) {
  for (let i = 0; i <= 20; i++) {
    const t = document.createElement('div');
    t.className = 'et66-tick' + (i % 5 === 0 ? ' major' : '');
    el.appendChild(t);
  }
}
buildTicks($('volTicks'));
buildTicks($('briTicks'));

function syncET66(trackEl, dotEl, pct) {
  pct = Math.max(0, Math.min(100, pct));
  const pad = 6, h = Math.max(0, trackEl.clientHeight - pad * 2);
  dotEl.style.top = (pad + (1 - pct / 100) * h) + 'px';
}
function setupET66(trackEl, dotEl, readoutEl, initVal, onCommit) {
  let val = initVal;
  function getVal(clientY) {
    const rect = trackEl.getBoundingClientRect(), pad = 6, h = rect.height - pad * 2;
    return Math.max(0, Math.min(100, Math.round((rect.bottom - clientY - pad) / h * 100)));
  }
  function update(v, smooth = false) {
    val = v;
    dotEl.classList.toggle('smooth', smooth);
    syncET66(trackEl, dotEl, v);
    readoutEl.textContent = v;
    if (smooth) setTimeout(() => dotEl.classList.remove('smooth'), 340);
  }
  trackEl.addEventListener('pointerdown', e => { e.preventDefault(); dotEl.classList.remove('smooth'); trackEl.setPointerCapture(e.pointerId); dragging = true; update(getVal(e.clientY)); });
  trackEl.addEventListener('pointermove', e => { if (!trackEl.hasPointerCapture(e.pointerId)) return; update(getVal(e.clientY)); });
  ['pointerup','pointercancel'].forEach(ev => trackEl.addEventListener(ev, e => {
    if (!trackEl.hasPointerCapture(e.pointerId)) return;
    trackEl.releasePointerCapture(e.pointerId); onCommit(val); setTimeout(() => dragging = false, 400);
  }));
  update(initVal);
  return { get: () => val, set: (v, smooth = false) => update(v, smooth) };
}

const volFader = setupET66($('volTrack'), $('volDot'), $('volVal'), 50, v => {
  if (!powered) { pendingVolume = v; return; }
  if (lastMuted) {
    preMuteVolume = v;
    lastSystemVolume = v;
    volFader.set(0);
    api('/api/volume', {value: v});
    return;
  }
  lastSystemVolume = v;
  api('/api/volume', {value: v});
});
const briFader = setupET66($('briTrack'), $('briDot'), $('briVal'),
  parseInt(localStorage.getItem('briLocal') || '50', 10), v => {
    if (!powered) { pendingBrightness = v; return; }
    commitBrightness(v);
  });
function commitBrightness(v) {
  if (briCli) { api('/api/brightness', {value: v}); }
  else {
    const prev = parseInt(localStorage.getItem('briLocal') || '50', 10);
    let delta = v - prev;
    if (v === 0) delta = -100; else if (v === 100) delta = 100;
    if (delta) api('/api/brightness', {delta});
    localStorage.setItem('briLocal', v);
  }
}
function recalcFaders() {
  syncET66($('volTrack'), $('volDot'), volFader.get());
  syncET66($('briTrack'), $('briDot'), briFader.get());
}
function recalcSoon() { [0,100,350,700].forEach(t => setTimeout(recalcFaders, t)); }
window.addEventListener('resize', recalcSoon);
window.addEventListener('orientationchange', recalcSoon);
window.addEventListener('load', recalcSoon);
requestAnimationFrame(recalcFaders);

function tick() {
  if (!powered) return;
  const d = new Date();
  $('hh').textContent = String(d.getHours()).padStart(2,'0');
  $('mm').textContent = String(d.getMinutes()).padStart(2,'0');
  const month = String(d.getMonth() + 1).padStart(2, '0');
  const date = String(d.getDate()).padStart(2, '0');
  $('calDate').textContent = `${d.getFullYear()}年${month}月${date}日`;
  const week = '日一二三四五六'[d.getDay()];
  $('weekText').textContent = week;
  $('weekGhost').textContent = week;
}
tick(); setInterval(tick, 1000);

async function api(path, body) {
  try { return await (await fetch(path, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(body||{}) })).json(); }
  catch(e) { return null; }
}

function music(action) {
  if (!powered) return;
  if (action === 'playpause') {
    const nextPlaying = !lastPlaying;
    lastPlaying = nextPlaying;
    playbackPending = { target: nextPlaying, until: Date.now() + 4500 };
    $('playBtn').innerHTML = lastPlaying ? ICON_PAUSE : ICON_PLAY;
    $('disc').classList.toggle('playing', !!lastPlaying);
  }
  api('/api/music', {action});
  if (action === 'playpause') { [500, 1200, 2500, 4600].forEach(t => setTimeout(refreshStatus, t)); }
  if (action === 'prev' || action === 'next') { setTimeout(refreshStatus, 300); setTimeout(refreshStatus, 900); }
}
function sys(action) {
  if (!powered) return;
  if (action === 'sleep' && !confirm('确定让 Mac 睡眠？')) return;
  api('/api/system', {action});
}
async function mute() {
  if (!powered || muteBusy) return;
  muteBusy = true;
  const muted = lastMuted !== true;
  try {
    if (muted) {
      preMuteVolume = lastSystemVolume ?? volFader.get();
      const muteRes = await api('/api/mute', {muted: true});
      const volRes = await api('/api/volume', {value: 0});
      if (muteRes?.ok || volRes?.ok) setMuteUi(true);
    } else {
      const restoreVolume = preMuteVolume ?? lastSystemVolume ?? volFader.get();
      const volRes = await api('/api/volume', {value: restoreVolume});
      const muteRes = await api('/api/mute', {muted: false});
      if (muteRes?.ok) {
        lastSystemVolume = volRes?.ok ? restoreVolume : lastSystemVolume;
        setMuteUi(false);
      }
    }
    setTimeout(refreshStatus, 250);
  } finally {
    muteBusy = false;
  }
}
function setMuteUi(muted) {
  lastMuted = muted;
  $('muteBtn').classList.toggle('active', muted);
  if (muted) {
    if (preMuteVolume == null) preMuteVolume = lastSystemVolume ?? volFader.get();
    volFader.set(0, true);
  } else {
    volFader.set(preMuteVolume ?? lastSystemVolume ?? volFader.get(), true);
    preMuteVolume = null;
  }
}
// Claude Code 权限菜单：Yes / Always / No
function cc(action) {
  if (!powered) return;
  api('/api/claude', {action});
}

async function refreshStatus() {
  if (!powered) return;
  try {
    const s = await (await fetch('/api/status')).json();
    briCli = !!s.brightnessCli;
    if (s.volume != null) lastSystemVolume = s.volume;
    const effectivelyMuted = !!s.muted || (lastMuted === true && s.volume === 0);
    if (effectivelyMuted && preMuteVolume == null && s.volume != null) preMuteVolume = s.volume;
    if (!effectivelyMuted && !muteBusy) preMuteVolume = null;
    if (!muteBusy) {
      lastMuted = effectivelyMuted;
      $('muteBtn').classList.toggle('active', effectivelyMuted);
    }
    if (!dragging) {
      if (s.volume != null) volFader.set(effectivelyMuted ? 0 : s.volume);
      if (briCli && s.brightness != null) briFader.set(s.brightness);
    }
    if (playbackPending) {
      const confirmed = s.playing === playbackPending.target;
      const expired = Date.now() >= playbackPending.until;
      if (confirmed || expired) {
        playbackPending = null;
        if (s.playing !== lastPlaying) { lastPlaying = s.playing; $('playBtn').innerHTML = s.playing ? ICON_PAUSE : ICON_PLAY; }
        $('disc').classList.toggle('playing', !!s.playing);
      }
    } else {
      if (s.playing !== lastPlaying) { lastPlaying = s.playing; $('playBtn').innerHTML = s.playing ? ICON_PAUSE : ICON_PLAY; }
      $('disc').classList.toggle('playing', !!s.playing);
    }
    const raw = s.track || '—';
    const sep = raw.indexOf(' — ');
    $('track').textContent  = sep > -1 ? raw.slice(0, sep)  : raw;
    $('artist').textContent = sep > -1 ? raw.slice(sep + 3) : '';
    if (s.track !== lastTrack) {
      lastTrack = s.track;
      const img = $('cover');
      if (s.cover) {
        const url = s.cover === '/api/cover' ? '/api/cover?t=' + encodeURIComponent(s.track) : s.cover;
        img.style.opacity = 0;
        const pre = new Image();
        pre.onload = () => {
          img.src = url;
          $('disc').classList.add('has-cover');
          requestAnimationFrame(() => img.style.opacity = 1);
        };
        pre.onerror = () => {
          $('disc').classList.remove('has-cover');
          img.removeAttribute('src');
          img.style.opacity = 0;
        };
        pre.src = url;
      } else {
        $('disc').classList.remove('has-cover');
        img.style.opacity = 0;
        setTimeout(() => img.removeAttribute('src'), 450);
      }
    }
  } catch(e) {}
}

// ── 同心环点阵碟 ──
function buildDisc(el) {
  const cx = 50, cy = 50, rings = 9, rIn = 15, rOut = 48, HI = 130; // 顶部高亮弧约 130°
  for (let i = 0; i < rings; i++) {
    const rad = rIn + (rOut - rIn) * i / (rings - 1);
    const count = Math.max(8, Math.round(2 * Math.PI * rad / 4.2));
    for (let k = 0; k < count; k++) {
      const a = k / count * 360;            // 0 在顶部，顺时针
      const ang = (a - 90) * Math.PI / 180;
      const dot = document.createElement('span');
      dot.className = 'disc-dot' + (a <= HI ? ' on' : '');
      dot.style.left = (cx + rad * Math.cos(ang)) + '%';
      dot.style.top  = (cy + rad * Math.sin(ang)) + '%';
      el.appendChild(dot);
    }
  }
}
buildDisc($('disc'));

function renderBluetooth(devices) {
  for (let i = 0; i < 3; i++) {
    const row = $('btRow' + i), name = $('btName' + i), pct = $('btPct' + i), fill = $('btFill' + i);
    const d = devices[i];
    if (!d) {
      row.classList.add('empty');
      row.classList.remove('low');
      name.textContent = i === 0 ? 'NO DEVICE' : '--';
      pct.textContent = '--';
      fill.style.width = '0%';
      continue;
    }
    const battery = Math.max(0, Math.min(100, Number(d.battery) || 0));
    row.classList.remove('empty');
    row.classList.toggle('low', battery <= 20);
    name.textContent = (d.name || '').trim() || '--';
    pct.textContent = battery + '%';
    fill.style.width = battery + '%';
  }
}

async function refreshBluetooth() {
  if (!powered) return;
  try {
    const s = await (await fetch('/api/bluetooth')).json();
    renderBluetooth(s.devices || []);
  } catch(e) {}
}

// 按钮按下脉冲
document.querySelectorAll('.key, .gkey').forEach(btn => {
  btn.addEventListener('pointerdown', () => {
    btn.classList.add('pressed');
    setTimeout(() => btn.classList.remove('pressed'), 220);
  });
});

refreshStatus(); setInterval(refreshStatus, 3000);
refreshBluetooth(); setInterval(refreshBluetooth, 15000);
</script>
